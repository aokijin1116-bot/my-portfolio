<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青木陣 | 自己紹介</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background-color: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }

    .hero {
      text-align: center;
      padding: 80px 20px 60px;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 60% 40%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      margin: 0 auto 24px;
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      color: #fff;
    }

    .subtitle {
      color: #a0a0c0;
      font-size: 15px;
      letter-spacing: 0.03em;
    }

    .content {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .section-label {
      font-size: 11px;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .hobbies {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .hobby-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 28px 16px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }

    .hobby-card:hover {
      transform: translateY(-4px);
      border-color: #6366f1;
    }

    .hobby-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .hobby-name {
      font-size: 14px;
      font-weight: 600;
      color: #c8c8e8;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="avatar">陣</div>
    <h1>青木 陣</h1>
    <p class="subtitle">はじめまして。ギャンブル・ゲーム・運動が好きです。</p>
  </div>

  <div class="content">
    <p class="section-label">趣味・好きなこと</p>
    <div class="hobbies">
      <div class="hobby-card">
        <div class="hobby-icon">🎲</div>
        <div class="hobby-name">ギャンブル</div>
      </div>
      <div class="hobby-card">
        <div class="hobby-icon">🎮</div>
        <div class="hobby-name">ゲーム</div>
      </div>
      <div class="hobby-card">
        <div class="hobby-icon">💪</div>
        <div class="hobby-name">運動</div>
      </div>
    </div>
  </div>

</body>
</html>
